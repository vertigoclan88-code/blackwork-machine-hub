<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTERS — BLACKWORK MACHINE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #111111;
            --text: #e8e8e8;
            --muted: #888888;
            --accent: #ff2e2e;
            --border: #222222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        h1 {
            text-align: center;
            font-size: clamp(40px, 10vw, 70px);
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }
        h1 span { color: var(--accent); }
        .subtitle {
            text-align: center;
            color: var(--muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 40px;
        }
        #masters-grid {
            display: grid;
            gap: 2px;
            background: var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .card {
            background: var(--surface);
            padding: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: 0.3s;
        }
        .card:hover { background: #1a1a1a; }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }
        .info h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .info .spec {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .info .bio {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.5;
        }
        .rating {
            display: flex;
            gap: 4px;
            margin-top: 5px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.active { background: var(--accent); }
        .dot.inactive { background: var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <h1>MAS<span>TERS</span></h1>
        <p class="subtitle">Our Artists</p>
        <div id="masters-grid"><p style="text-align:center;color:var(--muted);padding:40px">Loading...</p></div>
    </div>
    <script>
        fetch('/api/masters')
            .then(r => r.json())
            .then(items => {
                document.getElementById('masters-grid').innerHTML = items.map(i => `
                    <div class="card">
                        <div class="avatar">${i.name.split(' ')[0][0]}${i.name.split(' ')[1] ? i.name.split(' ')[1][0] : ''}</div>
                        <div class="info">
                            <h3>${i.name}</h3>
                            <div class="spec">${i.specialty} · ${i.experience}</div>
                            <div class="rating">${[1,2,3,4,5].map(n => `<div class="dot ${n <= i.rating ? 'active' : 'inactive'}"></div>`).join('')}</div>
                            <div class="bio">${i.bio}</div>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
