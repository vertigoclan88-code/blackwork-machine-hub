<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Models — BLACKWORK MACHINE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#080808;--surface:#111;--border:#1e1e1e;--text:#e8e8e8;--muted:#555;--accent:#ff2e2e}
        body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:2rem}
        h1{font-size:2.5rem;font-weight:700;text-align:center;margin-bottom:2rem;letter-spacing:-.03em}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);max-width:1000px;margin:0 auto}
        .card{background:var(--bg);padding:2rem;transition:background .2s}
        .card:hover{background:var(--surface)}
        .card h2{font-size:1.5rem;margin-bottom:.5rem;letter-spacing:-.02em}
        .card .tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:1rem;border:1px solid var(--border);padding:2px 8px;border-radius:2px}
        .card .spec{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted);margin-bottom:.25rem}
        .card .price{font-family:'JetBrains Mono',monospace;font-size:1.2rem;color:var(--accent);margin-top:1rem;font-weight:700}
    </style>
</head>
<body>
    <h1>🖤 MODELS</h1>
    <div class="grid" id="models"></div>
    <script>
        fetch('/api/catalog')
            .then(r => r.json())
            .then(items => {
                document.getElementById('models').innerHTML = items.map(i => `
                    <div class="card">
                        <div class="tag">${i.category}</div>
                        <h2>${i.name}</h2>
                        ${i.description.split('\n').map(l => `<div class="spec">${l}</div>`).join('')}
                        <div class="price">${i.price}</div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
