<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SETUP FINDER — BLACKWORK MACHINE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #111111;
            --text: #e8e8e8;
            --muted: #888888;
            --accent: #ff2e2e;
            --border: #222222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }
        h1 span { color: var(--accent); }
        .progress {
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            margin: 30px 0;
            transition: 0.3s;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: 0.5s;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }
        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .option {
            display: block;
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            text-align: left;
            transition: 0.2s;
        }
        .option:hover {
            border-color: var(--accent);
            background: #1a0a0a;
        }
        .result-card {
            text-align: center;
            padding: 40px 20px;
        }
        .result-card .icon { font-size: 4rem; margin-bottom: 20px; }
        .result-card h2 { font-size: 2rem; margin-bottom: 10px; }
        .result-card .price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--accent);
            margin: 15px 0;
        }
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SET<span>UP</span></h1>
        <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div class="card" id="quiz"></div>
    </div>
    <script>
        const questions = [
            { q: "Your primary style?", opts: ["Blackwork", "Dotwork", "Ornamental", "Dark Lettering"], scores: [[2,1,0,0],[0,2,1,0],[0,1,2,1],[0,0,1,2]] },
            { q: "Your hand pressure?", opts: ["Heavy — I push hard", "Medium — balanced", "Light — gentle touch"], scores: [[2,1,0],[1,2,1],[0,1,2]] },
            { q: "Average session length?", opts: ["Under 2 hours", "2–4 hours", "4+ hours"], scores: [[1,2,0],[1,1,2],[2,1,0]] }
        ];
        
        const machines = [
            { name: "VOID REAPER", icon: "🖤", price: "from $300/mo", desc: "Max density. Stroke 4.2mm. For large blackout areas." },
            { name: "SHADOW WOLF", icon: "⚡", price: "from $350/mo", desc: "Speed & density balance. Stroke 3.8mm. Universal fighter." },
            { name: "DARK KRISHNA X", icon: "🎯", price: "from $400/mo", desc: "Precision control. Stroke 3.5mm. Dark Lettering specialist." }
        ];
        
        let current = 0, scores = [0, 0, 0];
        
        function showQuestion() {
            if (current >= questions.length) {
                showResult();
                return;
            }
            let q = questions[current];
            let pct = (current / questions.length) * 100;
            document.getElementById('progress').style.width = pct + '%';
            document.getElementById('quiz').innerHTML = `
                <h2>${q.q}</h2>
                ${q.opts.map((o, i) => `<button class="option" onclick="answer(${i})">${o}</button>`).join('')}
            `;
        }
        
        function answer(idx) {
            let q = questions[current];
            for (let i = 0; i < scores.length; i++) {
                scores[i] += q.scores[idx][i];
            }
            current++;
            showQuestion();
        }
        
        function showResult() {
            document.getElementById('progress').style.width = '100%';
            let winner = scores.indexOf(Math.max(...scores));
            let m = machines[winner];
            document.getElementById('quiz').innerHTML = `
                <div class="result-card">
                    <div class="icon">${m.icon}</div>
                    <h2>${m.name}</h2>
                    <p>${m.desc}</p>
                    <div class="price">${m.price}</div>
                    <button class="btn" onclick="retake()">Retake Quiz</button>
                </div>
            `;
        }
        
        function retake() { current = 0; scores = [0,0,0]; showQuestion(); }
        
        showQuestion();
    </script>
</body>
</html>
