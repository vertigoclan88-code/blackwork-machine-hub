<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Finder - BLACKWORK MACHINE HUB</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;padding:2rem;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .container{text-align:center;max-width:600px}
        h1{color:#ff2e2e;margin-bottom:1rem}
        .option{display:block;width:100%;padding:1rem;margin:0.5rem 0;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:5px;cursor:pointer}
        .option.selected{border-color:#ff2e2e;background:#2a0000}
        .result{display:none;margin-top:2rem;padding:2rem;background:#1a1a1a;border:2px solid #ff2e2e;border-radius:10px}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 SETUP FINDER</h1>
        <div id="quiz"></div>
        <div class="result" id="result"></div>
    </div>
    <script>
        const questions = [
            {q:"Your style?",opts:["Blackwork","Dotwork","Ornamental","Realism"]},
            {q:"Size?",opts:["Small","Medium","Large"]},
            {q:"Priority?",opts:["Precision","Power","Versatility","Ergonomics"]}
        ];
        let current=0, answers=[];
        
        function showQuestion(){
            if(current>=questions.length){
                document.getElementById('result').style.display='block';
                document.getElementById('result').innerHTML='<h2>Recommended: STEALTH PRO X1</h2><p>Professional blackwork machine</p><p style="font-size:2rem;color:#ff2e2e">35 000 ₽</p>';
                return;
            }
            let q=questions[current];
            document.getElementById('quiz').innerHTML=`
                <h2>${q.q}</h2>
                ${q.opts.map(o=>`<button class="option" onclick="next('${o}')">${o}</button>`).join('')}
            `;
        }
        
        function next(a){answers.push(a);current++;showQuestion()}
        showQuestion();
    </script>
</body>
</html>
